services:
  nginx:
    image: nginx
    restart: on-failure:2
    volumes:
      - ./:/var/www
      - ./_docker/nginx/conf.d/:/etc/nginx/conf.d/
    ports:
      - "8080:80"
    container_name: teammanager_nginx
    depends_on:
      - teammanager

  teammanager:
    user: "1000:1000"
    restart: on-failure:2
    build:
      context: .
      dockerfile: _docker/teammanager/Dockerfile
    volumes:
      - ./:/var/www
    command: php-fpm
    depends_on:
      - mysql
    container_name: teammanager

  reverb:
    build:
      context: .
      dockerfile: _docker/teammanager/Dockerfile
    volumes:
      - ./:/var/www
    command: php artisan reverb:start
    ports:
      - "8081:8081"
    depends_on:
      - mysql
    container_name: teammanager_reverb

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    volumes:
      - ./tmp/db:/var/lib/mysql
    environment:
      MYSQL_DATABASE: teammanager
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "127.0.0.1:3306:3306"
    command: mysqld --character-set-server=utf8 --collation-server=utf8_unicode_ci
    container_name: teammanager_mysql

  redis:
    image: redis:8.4
    restart: unless-stopped
    volumes:
      - ./tmp/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes
    container_name: teammanager_redis
